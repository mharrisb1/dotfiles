---
- name: Setup Development Environment
  hosts: localhost
  connection: local
  environment:
    NVM_DIR: "{{ nvm_dir }}"
  vars:
    user_home: "{{ lookup('env', 'HOME') }}"
    xdg_config_home: "{{ user_home }}/.config"
    nvm_dir: "{{ user_home }}/.nvm"
    dotfiles_dir: "{{ playbook_dir }}"
    editor: "hx"

  tasks:
    - name: Set .NET version based on OS
      set_fact:
        dotnet_version: "{{ '9.0' if ansible_distribution_version == '24.04' else '8.0' }}"
      tags: [markdown]

    - name: System Packages
      become: yes
      tags: [base]
      apt:
        name:
          - software-properties-common
          - curl
          - git
          - gnupg
          - ca-certificates
          - locales
          - sudo
          - lsb-release
          - zsh
          - build-essential
          - clangd
          - tar
          - gzip
        state: present
        update_cache: yes

    - name: Generate Locale
      become: yes
      tags: [base]
      locale_gen:
        name: en_US.UTF-8
        state: present

    - name: Ensure ZSH is the default shell
      become: yes
      user:
        name: "{{ lookup('env', 'USER') }}"
        shell: /usr/bin/zsh
      tags: [base]

    - name: Create required directories
      tags: [base]
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ xdg_config_home }}"
        - "{{ nvm_dir }}"

    - name: Symlink configuration directories
      tags: [base]
      file:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        force: yes
      loop:
        - { src: "helix", dest: "{{ xdg_config_home }}/helix" }
        - { src: "zellij", dest: "{{ xdg_config_home }}/zellij" }
        - { src: "lazygit", dest: "{{ xdg_config_home }}/lazygit" }
        - { src: "xplr", dest: "{{ xdg_config_home }}/xplr" }
        - { src: "delta", dest: "{{ xdg_config_home }}/delta" }

    - name: Copy NVM directory
      tags: [base]
      copy:
        src: "{{ dotfiles_dir }}/nvm/"
        dest: "{{ nvm_dir }}/"
        mode: "0755"

    - name: Install Oh My Zsh
      tags: [base]
      shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      args:
        creates: "{{ user_home }}/.oh-my-zsh"

    - name: Set ZSH theme
      tags: [base]
      lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "^ZSH_THEME="
        line: 'ZSH_THEME="agnoster"'

    - name: Set EDITOR environment variable
      tags: [base]
      lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "^export EDITOR="
        line: 'export EDITOR="{{ editor }}"'

    - name: Set HELIX_RUNTIME environment variable
      tags: [base]
      lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "^export HELIX_RUNTIME="
        line: 'export HELIX_RUNTIME="{{ user_home }}/helix/runtime"'

    - name: Add NVM initialization to .zshrc
      tags: [base, js]
      blockinfile:
        path: "{{ user_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: NVM"
        block: |
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

    - name: HashiCorp GPG Key
      become: yes
      tags: [terraform]
      apt_key:
        url: https://apt.releases.hashicorp.com/gpg
        state: present
        keyring: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: HashiCorp Repository
      become: yes
      tags: [terraform]
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: HashiCorp Packages
      become: true
      tags: [terraform]
      apt:
        name:
          - terraform
          - terraform-ls
        state: present
        update_cache: yes

    - name: .NET backports PPA
      become: yes
      tags: [markdown]
      apt_repository:
        repo: ppa:dotnet/backports
        state: present

    - name: .NET Packages
      become: yes
      tags: [markdown]
      apt:
        name:
          - "dotnet-sdk-{{ dotnet_version }}"
          - "dotnet-runtime-{{ dotnet_version }}"
        state: present
        update_cache: yes

    - name: JDK Packages
      become: yes
      tags: [java]
      apt:
        name:
          - libxml2-utils
          - openjdk-21-jdk
        state: present
        update_cache: yes

    - name: Install Rustup
      tags: [base]
      become: yes
      snap:
        name: rustup
        classic: true

    - name: Install Cargo and Rust
      tags: [base]
      shell: rustup default stable
      args:
        creates: /usr/bin/cargo

    - name: Install Go
      tags: [base, go]
      become: yes
      snap:
        name: go
        classic: yes

    - name: Install uv
      tags: [python, yaml]
      shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: "{{ user_home }}/.local/bin/uv"

    - name: Install NVM
      tags: [base, js]
      shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
      args:
        creates: "{{ nvm_dir }}/nvm.sh"

    - name: Install Node.js LTS via NVM
      tags: [base, js]
      shell: . "{{ nvm_dir }}/nvm.sh" && nvm install --lts
      args:
        executable: /bin/bash
        creates: "{{ nvm_dir }}/versions/node"

    - name: Install Cargo tools
      tags: [base]
      shell: "cargo install --locked {{ item }}"
      loop:
        - zellij
        - git-delta
      args:
        creates: "{{ user_home }}/.cargo/bin/{{ item }}"

    - name: Clone and build Helix
      tags: [base]
      git:
        repo: https://github.com/helix-editor/helix
        dest: "{{ user_home }}/helix"
        depth: 1

    - name: Install Helix
      tags: [base]
      shell: "cargo install --profile opt --path helix-term --locked"
      args:
        chdir: "{{ user_home }}/helix"
        creates: "{{ user_home }}/.cargo/bin/hx"

    - name: Clone and build xplr
      tags: [base]
      git:
        repo: https://github.com/sayanarijit/xplr.git
        dest: "{{ user_home }}/xplr"
        depth: 1

    - name: Build xplr
      tags: [base]
      shell: "cargo build --locked --release --bin xplr"
      args:
        chdir: "{{ user_home }}/xplr"
        creates: "{{ user_home }}/xplr/target/release/xplr"

    - name: Install xplr binary
      tags: [base]
      become: yes
      copy:
        src: "{{ user_home }}/xplr/target/release/xplr"
        dest: /usr/local/bin/xplr
        mode: "0755"
        remote_src: yes

    - name: Clone and build marksman
      tags: [markdown]
      git:
        repo: https://github.com/artempyanykh/marksman.git
        dest: "{{ user_home }}/marksman"
        depth: 1

    - name: Install marksman
      tags: [markdown]
      shell: make install
      args:
        chdir: "{{ user_home }}/marksman"
        creates: "{{ user_home }}/.local/bin/marksman"

    - name: Install uv tools
      tags: [python, yaml]
      shell: "uv tool install {{ item }}"
      loop:
        - ansible-lint==26.4.0
        - basedpyright==1.39.0
        - ruff@0.15.9
