[general]
live_config_reload = true

[window.padding]
x = 9
y = 9

[font]
size = 10

[font.normal]
family = "JetBrainsMonoNL Nerd Font Mono"
style = "Regular"

[colors.normal]
red     = '#ea4a5a'
green   = '#34d058'
yellow  = '#ffea7f'
blue    = '#2188ff'
magenta = '#b392f0'
cyan    = '#39c5cf'
white   = '#d1d5da'

[colors.bright]
red     = '#f97583'
green   = '#85e89d'
yellow  = '#ffea7f'
blue    = '#79b8ff'
magenta = '#b392f0'
cyan    = '#56d4dd'
white   = '#fafbfc'

[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\u0015"

[[keyboard.bindings]]
key = "Right"
mods = "Command"
chars = "\u0005"

[[keyboard.bindings]]
key = "Left"
mods = "Command"
chars = "\u0001"
