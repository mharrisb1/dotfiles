---
- name: System packages
  become: true
  apt:
    name:
      - software-properties-common
      - curl
      - git
      - gnupg
      - ca-certificates
      - locales
      - sudo
      - lsb-release
      - zsh
      - build-essential
      - clangd
      - tar
      - gzip
      - gdb
      - valgrind
      - pkg-config
      - python3-pip
      - python3-venv
      - python3-dev
      - libssl-dev
      - htop
      - psmisc
      - bat
      - fzf
    state: present
    update_cache: true

- name: Generate locale
  become: true
  locale_gen:
    name: en_US.UTF-8
    state: present

- name: Ensure ZSH is the default shell
  become: true
  user:
    name: "{{ lookup('env', 'USER') }}"
    shell: /usr/bin/zsh

- name: Create required directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_config_home }}"
    - "{{ nvm_dir }}"

- name: Symlink configuration directories
  file:
    src: "{{ dotfiles_dir }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "helix", dest: "{{ xdg_config_home }}/helix" }
    - { src: "zellij", dest: "{{ xdg_config_home }}/zellij" }
    - { src: "lazygit", dest: "{{ xdg_config_home }}/lazygit" }
    - { src: "xplr", dest: "{{ xdg_config_home }}/xplr" }
    - { src: "delta", dest: "{{ xdg_config_home }}/delta" }
    - { src: "git", dest: "{{ xdg_config_home }}/git" }

- name: Symlink shell rc files into HOME
  file:
    src: "{{ dotfiles_dir }}/{{ item }}"
    dest: "{{ user_home }}/{{ item }}"
    state: link
    force: true
  loop:
    - .env
    - .alias

- name: Copy NVM directory
  copy:
    src: "{{ dotfiles_dir }}/nvm/"
    dest: "{{ nvm_dir }}/"
    mode: "0755"

- name: Symlink /home/ubuntu to current user_home for hardcoded configs
  become: true
  file:
    src: "{{ user_home }}"
    dest: /home/ubuntu
    state: link
    force: true
  when: user_home != '/home/ubuntu'
