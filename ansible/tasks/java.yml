---
- name: JDK packages
  become: true
  apt:
    name:
      - libxml2-utils
      - openjdk-21-jdk
    state: present
    update_cache: true

# Assumes the jdtls launcher is already available on PATH (installed out-of-band;
# the eclipse.org download and Maven build are both blocked by the corporate
# firewall / artifact quarantine in this environment).

- name: Ensure ~/.local/share/java exists
  file:
    path: "{{ user_home }}/.local/share/java"
    state: directory
    mode: "0755"

- name: Download lombok.jar
  get_url:
    url: "https://repo.maven.apache.org/maven2/org/projectlombok/lombok/{{ lombok_version }}/lombok-{{ lombok_version }}.jar"
    dest: "{{ user_home }}/.local/share/java/lombok.jar"
    mode: "0644"

- name: Download Maven tarball
  get_url:
    url: "https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/{{ maven_version }}/apache-maven-{{ maven_version }}-bin.tar.gz"
    dest: "/tmp/apache-maven-{{ maven_version }}-bin.tar.gz"
    mode: "0644"

- name: Extract Maven to /usr/local
  become: true
  unarchive:
    src: "/tmp/apache-maven-{{ maven_version }}-bin.tar.gz"
    dest: /usr/local
    remote_src: true
    # Tarball extracts root-only (0750); make it traversable/readable for all users.
    mode: "a+rX"
    creates: "/usr/local/apache-maven-{{ maven_version }}/bin/mvn"

- name: Symlink mvn onto PATH
  become: true
  file:
    src: "/usr/local/apache-maven-{{ maven_version }}/bin/mvn"
    dest: /usr/local/bin/mvn
    state: link
    force: true
