---
- name: Download Go tarball
  get_url:
    url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    mode: "0644"

- name: Remove existing Go installation
  become: true
  file:
    path: /usr/local/go
    state: absent
  when: not ansible_check_mode

- name: Extract Go to /usr/local
  become: true
  unarchive:
    src: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: true
    creates: "/usr/local/go/bin/go"

- name: Install Go tools
  command:
    cmd: "/usr/local/go/bin/go install {{ item.package }}@latest"
    creates: "{{ user_home }}/go/bin/{{ item.bin }}"
  loop:
    - { package: "github.com/jesseduffield/lazygit", bin: "lazygit" }
    - { package: "github.com/jesseduffield/lazydocker", bin: "lazydocker" }
    - { package: "github.com/charmbracelet/glow/v2", bin: "glow" }
  loop_control:
    label: "{{ item.bin }}"
