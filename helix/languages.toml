###########
# Bash
###########
[[language]]
name = "bash"
formatter = { command = "shfmt", args = ["-i", "2"] }
auto-format = true

###########
# C/C++
###########
[[language]]
name = "c"
auto-format = true
language-servers = ["clangd"]

[[language]]
name = "cpp"
auto-format = true
language-servers = ["clangd"]

[language-server.clangd]
command = "clangd"
args = ["--fallback-style=none"]

###########
# CSS
###########
[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[[language]]
name = "css"
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "css"] }
auto-format = true

[language-server.vscode-css-language-server]
config = { css = { lint = { unknownAtRules = "ignore" } } }

##############
# Dockerfile
##############
[[language]]
name = "dockerfile"
auto-format = true
formatter = { command = "dockerfmt" }

###########
# HTML
###########
[[language]]
name = "html"
language-servers = ["vscode-html-language-server", "tailwindcss-ls"]
formatter = { command = 'prettier', args = ["--parser", "html"] }
auto-format = true

###########
# Java
###########
[[language]]
name = "java"
scope = "source.java"
file-types = ["java"]
language-servers = ["jdtls"]

[language-server.jdtls]
command = "jdtls"
timeout = 60
args = [
  "--jvm-arg=-javaagent:/home/ubuntu/.local/share/java/lombok.jar",
  "-data",
  "/home/ubuntu/.cache/jdtls-workspace",
]

[language-server.jdtls.config.java.configuration]
runtimes = [
  { name = "JavaSE-21", path = "/usr/lib/jvm/java-21-openjdk-amd64", default = true },
]

###########
# JS/TS
###########
[[language]]
name = "typescript"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
]
formatter = { command = "npx", args = [
  "prettier",
  "--parser",
  "typescript",
  "--semi",
] }
auto-format = false

[[language]]
name = "javascript"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
]
formatter = { command = "npx", args = [
  "prettier",
  "--parser",
  "typescript",
  "--semi",
] }
auto-format = false

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.biome.config.biome]
experimental.rename = true

[language-server.biome.config.biome.inlineConfig]
linter.rules.suspicious.noConsole = "off"

[language-server.vscode-eslint-language-server.config]
format = true
nodePath = ""
# onIgnoredFiles = "off"
# packageManager = "yarn"
quiet = false
rulesCustomizations = []
run = "onType"
# useESLintClass = false
validate = "on"
codeAction = { disableRuleComment = { enable = true, location = "separateLine" }, showDocumentation = { enable = true } }
codeActionsOnSave = { mode = "all", enable = true }
experimental = { useFlatConfig = true }
problems = { shortenToSingleLine = true }
workingDirectory = { mode = "auto" }

[[language]]
name = "jsx"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "tailwindcss-ls",
  "biome",
]
formatter = { command = "npx", args = [
  "prettier",
  "--parser",
  "typescript",
  "--semi",
] }
auto-format = false

[[language]]
name = "tsx"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "tailwindcss-ls",
  "biome",
]
formatter = { command = "npx", args = [
  "prettier",
  "--parser",
  "typescript",
  "--semi",
] }
auto-format = false

############
# JSON
############
[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = true

[[language]]
name = "jsonc"
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = true

[[language-server.vscode-json-language-server.config.json.schemas]]
fileMatch = ["tsconfig.json", "tsconfig.*.json"]
url = "https://json.schemastore.org/tsconfig.json"

[[language-server.vscode-json-language-server.config.json.schemas]]
fileMatch = ["package.json"]
url = "https://json.schemastore.org/package.json"

############
# Markdown
############
[[language]]
name = "markdown"
language-servers = ["marksman"]
formatter = { command = "prettier", args = ["--parser", "markdown"] }
soft-wrap.enable = true
auto-format = true

[language.auto-pairs]
"(" = ")"
"*" = "*"

############
# NGINX
############
[[language]]
name = "nginx"
file-types = [
  { glob = "sites-available/*.conf" },
  { glob = "sites-enabled/*.conf" },
  { glob = "nginx.conf" },
  { glob = "conf.d/*.conf" },
  { glob = "*.conf.template" },
  { glob = "conf.template" },
  { glob = "config.template" },
]

############
# Python
############
[[language]]
name = "python"
language-servers = ["basedpyright", "ruff"]
auto-format = true

[language-server.ruff]
command = "ruff"
args = ["server"]

###########
# Rust
###########
[[language]]
name = "rust"
scope = "source.rust"
injection-regex = "rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
auto-format = true
language-servers = ["rust-analyzer"]
indent = { tab-width = 4, unit = "    " }

#####################
# Terraform/OpenTofu
#####################
[[language]]
name = "hcl"
auto-format = true
formatter = { command = "terraform", args = ["fmt", "-"] }
language-servers = ["terraform-ls"]
language-id = "terraform"

[[language]]
name = "tfvars"
auto-format = true
formatter = { command = "terraform", args = ["fmt", "-"] }
language-servers = ["terraform-ls"]
language-id = "terraform-vars"

[language-server.terraform-ls]
command = "terraform-ls"
args = ["serve"]


############
# TOML
############
[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }
auto-format = true

############
# XML
############
[[language]]
name = "xml"
auto-format = true
formatter = { command = "xmllint", args = ["--format", "-"] }
language-servers = ["xml"]

[language-server.xml]
command = "lemminx"

############
# YAML
############
[[language]]
name = "yaml"
auto-format = true
formatter = { command = 'prettier', args = ["--parser", "yaml"] }
